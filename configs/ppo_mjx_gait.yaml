# MJX GPU training with finger gaiting + domain randomization
# Strategy A: Train on MJX with DR, then fine-tune on CPU MuJoCo
env:
  xml_path: "models/dex3_dice_scene_mjx.xml"
  max_episode_steps: 50
  frameskip: 10
  action_scale: 0.3

obs_dim: 48
act_dim: 7

ppo:
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  value_coef: 1.0
  entropy_coef: 0.0
  lr: 3.0e-4
  lr_end: 1.0e-5
  max_grad_norm: 0.5
  n_epochs: 3
  minibatch_size: 4096
  rollout_steps: 64
  total_updates: 4000

network:
  hidden_dims: [512, 256, 128]
  activation: "tanh"
  log_std_init: -2.0

reward:
  distance_scale: 1.0
  progress_scale: 15.0
  goal_bonus: 100.0
  goal_threshold: 0.25
  drop_penalty: -50.0
  drop_height: 0.03
  gait_lift_bonus: 0.0
  gait_replace_bonus: 0.0
  gait_force_threshold: 0.3
  hold_bonus: 0.05
  action_smooth_coef: 0.02
  contact_bonus: 0.1
  contact_penalty_1: -0.1

training:
  seed: 42
  checkpoint_interval: 200
  log_interval: 5
  eval_interval: 25
  eval_episodes: 40
  device: "cuda"
  normalize_obs: true
  n_envs: 2048

# 7-phase curriculum (matches CPU gait phases)
curriculum:
  phases:
    - name: "GRIP"
      max_angle: 0.0
      faces: [1]
      advance_threshold: 0.95
      min_episodes: 500
      min_updates_override: 25
      log_std_bounds: [-4.0, -2.5]
      entropy_coef: 0.0
      max_episode_steps: 50
      action_scale: 0.15
      reward_overrides:
        gait_lift_bonus: 0.0
        gait_replace_bonus: 0.0
        progress_scale: 0.0
        action_smooth_coef: 0.05
        hold_bonus: 0.1

    - name: "MICRO_ROTATE"
      max_angle: 0.3
      faces: [1]
      advance_threshold: 0.70
      min_episodes: 1000
      min_updates_override: 30
      log_std_bounds: [-3.5, -1.5]
      entropy_coef: 0.001
      max_episode_steps: 75
      action_scale: 0.2
      reward_overrides:
        gait_lift_bonus: 0.0
        gait_replace_bonus: 0.0
        progress_scale: 15.0
        action_smooth_coef: 0.03

    - name: "GAIT_EMERGE"
      max_angle: 0.8
      faces: [1]
      advance_threshold: 0.45
      min_episodes: 2000
      min_updates_override: 50
      log_std_bounds: [-3.0, -0.7]
      entropy_coef: 0.005
      max_episode_steps: 100
      action_scale: 0.3
      reward_overrides:
        gait_lift_bonus: 0.5
        gait_replace_bonus: 0.3
        progress_scale: 10.0
        action_smooth_coef: 0.02

    - name: "MED_ROTATE"
      max_angle: 1.57
      faces: [1]
      advance_threshold: 0.40
      min_episodes: 2000
      min_updates_override: 75
      log_std_bounds: [-3.0, -0.7]
      entropy_coef: 0.005
      max_episode_steps: 100
      action_scale: 0.3
      reward_overrides:
        gait_lift_bonus: 0.4
        gait_replace_bonus: 0.25
        progress_scale: 12.0
        action_smooth_coef: 0.02

    - name: "SINGLE_FULL"
      max_angle: 3.15
      start_faces: [2]
      faces: [1]
      advance_threshold: 0.35
      min_episodes: 2000
      min_updates_override: 100
      log_std_bounds: [-3.0, -0.7]
      entropy_coef: 0.005
      max_episode_steps: 100
      action_scale: 0.3
      reward_overrides:
        gait_lift_bonus: 0.3
        gait_replace_bonus: 0.2
        progress_scale: 15.0
        action_smooth_coef: 0.02

    - name: "MULTI_FULL"
      max_angle: 3.15
      start_faces: [2, 3, 4, 5]
      faces: [1]
      advance_threshold: 0.30
      min_episodes: 3000
      min_updates_override: 150
      log_std_bounds: [-3.0, -0.7]
      entropy_coef: 0.005
      max_episode_steps: 100
      action_scale: 0.3
      reward_overrides:
        gait_lift_bonus: 0.2
        gait_replace_bonus: 0.1
        progress_scale: 15.0
        action_smooth_coef: 0.01

    - name: "ALL_FACES"
      max_angle: 3.15
      start_faces: [1, 2, 3, 4, 5, 6]
      faces: [1, 2, 3, 4, 5, 6]
      advance_threshold: 0.80
      min_episodes: 5000
      log_std_bounds: [-3.5, -1.2]
      entropy_coef: 0.0
      max_episode_steps: 100
      action_scale: 0.3
      reward_overrides:
        gait_lift_bonus: 0.1
        gait_replace_bonus: 0.1
        progress_scale: 15.0
        action_smooth_coef: 0.01

# Domain randomization
domain_rand:
  enabled: true
  fingertip_friction_range: [0.5, 1.0]
  cube_friction_range: [0.4, 1.2]
  mass_scale: [0.8, 1.2]
  kp_scale: [0.8, 1.2]
  damping_scale: [0.8, 1.2]
  frictionloss_scale: [0.5, 2.0]
  armature_scale: [1.0, 1.05]
  link_mass_scale: [0.9, 1.1]
  obs_noise:
    level: 1.0
    joint_pos: 0.05
    cube_pos: 0.02
    cube_ori: 0.1
