# Environment — Native position actuators (kp=5, dampratio=1)
env:
  xml_path: "models/dex3_dice_scene_torque.xml"
  max_episode_steps: 50       # Short episodes force fast action
  frameskip: 10
  physics_dt: 0.002
  control_dt: 0.02
  action_scale: 0.3           # Radians of position offset per action unit

obs_dim: 48
act_dim: 7

# PPO
ppo:
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  value_coef: 1.0             # Train critic faster
  entropy_coef: 0.0           # Phase-controlled in training loop
  lr: 3.0e-4
  lr_end: 1.0e-5
  max_grad_norm: 0.5
  n_epochs: 3                 # Fewer epochs = faster updates
  minibatch_size: 512
  rollout_steps: 64            # Shorter rollouts = ~3x faster per update
  total_updates: 6000          # Enough for 11 phases

# Network
network:
  hidden_dims: [256, 256]
  activation: "tanh"
  log_std_init: -2.0

# Reward — distance + progress + contact
reward:
  distance_scale: 1.0         # Per-step: -quat_dist (range: -1 to 0)
  progress_scale: 15.0        # Delta improvement (directional signal)
  contact_bonus: 0.1          # Bonus for 2+ finger contact
  goal_bonus: 100.0           # One-time on achievement
  goal_threshold: 0.25        # ~83 degrees (1-|cos(θ/2)|)
  drop_penalty: -50.0
  drop_height: 0.03

# Training
training:
  seed: 42
  checkpoint_interval: 100
  log_interval: 5
  eval_interval: 100           # Less frequent eval = faster
  eval_episodes: 20            # Fewer eval episodes = faster
  device: "cuda"
  normalize_obs: true
  n_envs: 32

# 9-phase graduated curriculum with per-phase episode length and action scale
curriculum:
  phases:
    - name: "HOLD"
      max_angle: 0.0           # Cube starts exactly at goal
      faces: [1]
      advance_threshold: 0.90
      min_episodes: 500
      log_std_bounds: [-4.0, -2.5]
      entropy_coef: 0.0
      max_episode_steps: 50
      action_scale: 0.15       # Tight control for holding
    - name: "TINY_ROT"
      max_angle: 0.2           # ~11 degrees
      faces: [1]
      advance_threshold: 0.75
      min_episodes: 800
      log_std_bounds: [-3.5, -1.5]
      entropy_coef: 0.001
      max_episode_steps: 50
      action_scale: 0.2
    - name: "SMALL_ROT"
      max_angle: 0.5           # ~29 degrees
      faces: [1]
      advance_threshold: 0.55
      min_episodes: 1000
      log_std_bounds: [-3.0, -1.0]
      entropy_coef: 0.003
      max_episode_steps: 75
      action_scale: 0.3
    - name: "MED_ROT"
      max_angle: 0.8           # ~46 degrees
      faces: [1]
      advance_threshold: 0.45
      min_episodes: 1000
      log_std_bounds: [-3.0, -0.7]
      entropy_coef: 0.005
      max_episode_steps: 100
      action_scale: 0.3
    - name: "LARGE_ROT"
      max_angle: 1.2           # ~69 degrees
      faces: [1]
      advance_threshold: 0.40
      min_episodes: 1000
      log_std_bounds: [-3.0, -0.7]
      entropy_coef: 0.005
      max_episode_steps: 100
      action_scale: 0.3
    - name: "ADJ_SINGLE"
      max_angle: 3.15
      start_faces: [2]         # 90° rotation (face 2 → face 1)
      faces: [1]
      advance_threshold: 0.35
      min_episodes: 1500
      log_std_bounds: [-3.0, -0.7]
      entropy_coef: 0.005
      max_episode_steps: 100
      action_scale: 0.3
    - name: "ADJ_ALL"
      max_angle: 3.15
      start_faces: [2, 3, 4, 5]
      faces: [1]
      advance_threshold: 0.35
      min_episodes: 2000
      min_updates_override: 100    # Prevent instant advancement
      log_std_bounds: [-3.0, -0.7]
      entropy_coef: 0.005
      max_episode_steps: 100
      action_scale: 0.3
    - name: "ALL_STARTS"
      max_angle: 3.15
      start_faces: [1, 2, 3, 4, 5, 6]
      faces: [1]
      advance_threshold: 0.30
      min_episodes: 2000
      min_updates_override: 100    # Prevent instant advancement
      log_std_bounds: [-3.0, -0.7]
      entropy_coef: 0.005
      max_episode_steps: 100
      action_scale: 0.3
    - name: "TWO_FACES"
      max_angle: 3.15
      start_faces: [1, 2, 3, 4, 5, 6]
      faces: [1, 6]               # Opposite faces (easiest pair: 180°)
      advance_threshold: 0.35
      min_episodes: 2000
      min_updates_override: 100
      log_std_bounds: [-3.0, -0.7]
      entropy_coef: 0.005
      max_episode_steps: 100
      action_scale: 0.3
    - name: "FOUR_FACES"
      max_angle: 3.15
      start_faces: [1, 2, 3, 4, 5, 6]
      faces: [1, 2, 5, 6]         # 4 faces (top/bottom + front/back)
      advance_threshold: 0.30
      min_episodes: 2000
      min_updates_override: 100
      log_std_bounds: [-3.0, -0.7]
      entropy_coef: 0.005
      max_episode_steps: 100
      action_scale: 0.3
    - name: "ALL_FACES"
      max_angle: 3.15
      start_faces: [1, 2, 3, 4, 5, 6]
      faces: [1, 2, 3, 4, 5, 6]
      advance_threshold: 0.90
      min_episodes: 3000
      log_std_bounds: [-3.0, -0.7]
      entropy_coef: 0.005
      max_episode_steps: 100
      action_scale: 0.3

# Domain randomization
domain_rand:
  enabled: false
